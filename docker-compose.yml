networks:
  umbra-net:
    driver: bridge

services:

  # -- Nginx: Public SNI gateway + HTTP virtual hosts ---------------------------
  umbra-nginx:
    image: nginx:alpine
    container_name: umbra-nginx
    restart: always
    depends_on:
      - umbra-marzban
      - umbra-subproxy
      - umbra-account
      - umbra-vaultwarden
      - umbra-portal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DATA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/stream.d:/etc/nginx/stream.d:ro
      - ${DATA_DIR}/nginx/snippets:/etc/nginx/snippets:ro
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/nginx/private:/etc/nginx/private:ro
      - ${DATA_DIR}/letsencrypt:/etc/letsencrypt:ro
      - ${DATA_DIR}/certbot/www:/var/www/certbot:ro
      - ${DATA_DIR}/nginx/logs:/var/log/nginx
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -- Marzban: VPN manager (includes Xray-core subprocess) ---------------------
  # Marzban binds to 127.0.0.1 (loopback) when no SSL cert is provided, making
  # it unreachable from other Docker containers. We supply a self-signed cert
  # (generated by 05-up.sh) so it binds to 0.0.0.0. nginx proxies via https
  # with proxy_ssl_verify off (cert is internal only).
  umbra-marzban:
    image: gozargah/marzban:latest
    container_name: umbra-marzban
    restart: always
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
      UVICORN_SSL_CERTFILE: "/var/lib/marzban/tls/cert.pem"
      UVICORN_SSL_KEYFILE: "/var/lib/marzban/tls/key.pem"
      UVICORN_SSL_CA_TYPE: "${MARZBAN_SSL_CA_TYPE:-public}"
      SQLALCHEMY_DATABASE_URL: "sqlite:////var/lib/marzban/db.sqlite3"
      XRAY_JSON: "/var/lib/marzban/xray_config.json"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/share/xray"
      SUDO_USERNAME: "${MARZBAN_ADMIN_USER}"
      SUDO_PASSWORD: "${MARZBAN_ADMIN_PASSWORD}"
      XRAY_SUBSCRIPTION_URL_PREFIX: "${SUBSCRIPTION_URL_PREFIX}"
      SUB_PROFILE_TITLE: "${SUB_PROFILE_TITLE:-Ruyin}"
      CUSTOM_TEMPLATES_DIRECTORY: "/var/lib/marzban/templates"
      CLASH_SUBSCRIPTION_TEMPLATE: "clash/default.yml"
    volumes:
      - ${DATA_DIR}/marzban:/var/lib/marzban
    networks:
      - umbra-net

  # -- Subscription metadata normalizer ----------------------------------------
  # Public URL remains /sub/<token>. This service only normalizes response
  # metadata so clients display Ruyin-USERNAME instead of raw Marzban filename.
  umbra-subproxy:
    image: python:3.12-alpine
    container_name: umbra-subproxy
    restart: always
    depends_on:
      - umbra-marzban
    environment:
      MARZBAN_BASE_URL: "https://umbra-marzban:8000"
      SUB_PROFILE_PREFIX: "${SUB_PROFILE_PREFIX:-Ruyin}"
    volumes:
      - ./services/subproxy/subproxy.py:/app/subproxy.py:ro
    command: ["python", "/app/subproxy.py"]
    networks:
      - umbra-net

  # -- Account Portal: invite-bound user subscription dashboard ----------------
  umbra-account:
    image: python:3.12-alpine
    container_name: umbra-account
    restart: always
    depends_on:
      - umbra-marzban
    environment:
      ACCOUNT_DB_PATH: "/var/lib/umbra-account/account.db"
      ACCOUNT_SESSION_SECRET: "${ACCOUNT_SESSION_SECRET}"
      ACCOUNT_INVITE_SECRET: "${ACCOUNT_INVITE_SECRET}"
      ACCOUNT_INVITE_TTL_DAYS: "${ACCOUNT_INVITE_TTL_DAYS:-30}"
      MARZBAN_BASE_URL: "https://umbra-marzban:8000"
      SUB_PROFILE_PREFIX: "${SUB_PROFILE_PREFIX:-Ruyin}"
    volumes:
      - ${DATA_DIR}/account:/var/lib/umbra-account
      - ./services/account/account.py:/app/account.py:ro
    command: ["python", "/app/account.py"]
    networks:
      - umbra-net

  # -- Vaultwarden: Password manager --------------------------------------------
  # Uses SQLite by default - database stored in the /data volume.
  umbra-vaultwarden:
    image: vaultwarden/server:latest
    container_name: umbra-vaultwarden
    restart: always
    environment:
      DOMAIN: "https://${PASS_DOMAIN}"
      SIGNUPS_ALLOWED: "false"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN}"
      LOG_LEVEL: "warn"
    volumes:
      - ${DATA_DIR}/vaultwarden/data:/data
    networks:
      - umbra-net

  # -- Static Guide: Legacy onboarding content under /guide/ ---------------------
  umbra-portal:
    image: nginx:alpine
    container_name: umbra-portal
    restart: always
    volumes:
      - ${DATA_DIR}/portal/html:/usr/share/nginx/html:ro
    networks:
      - umbra-net
