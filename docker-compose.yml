networks:
  umbra-net:
    driver: bridge

services:

  # -- Nginx: Public SNI gateway + HTTP virtual hosts ---------------------------
  umbra-nginx:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-nginx:${IMAGE_TAG:-latest}
    container_name: umbra-nginx
    restart: always
    depends_on:
      - umbra-marzban
      - umbra-subproxy
      - umbra-account
      - umbra-account-web
      - umbra-website
      - umbra-admin
      - umbra-vaultwarden
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DATA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DATA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_DIR}/nginx/stream.d:/etc/nginx/stream.d:ro
      - ${DATA_DIR}/nginx/snippets:/etc/nginx/snippets:ro
      - ${DATA_DIR}/nginx/html:/usr/share/nginx/html:ro
      - ${DATA_DIR}/nginx/private:/etc/nginx/private:ro
      - ${DATA_DIR}/letsencrypt:/etc/letsencrypt:ro
      - ${DATA_DIR}/certbot/www:/var/www/certbot:ro
      - ${DATA_DIR}/nginx/logs:/var/log/nginx
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -- Marzban: VPN manager (includes Xray-core subprocess) ---------------------
  # Marzban binds to 127.0.0.1 (loopback) when no SSL cert is provided, making
  # it unreachable from other Docker containers. We supply a self-signed cert
  # (generated by 05-start-docker-services.sh) so it binds to 0.0.0.0. nginx proxies via https
  # with proxy_ssl_verify off (cert is internal only).
  umbra-marzban:
    image: gozargah/marzban:latest
    container_name: umbra-marzban
    restart: always
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
      UVICORN_SSL_CERTFILE: "/var/lib/marzban/tls/cert.pem"
      UVICORN_SSL_KEYFILE: "/var/lib/marzban/tls/key.pem"
      UVICORN_SSL_CA_TYPE: "${MARZBAN_SSL_CA_TYPE:-public}"
      SQLALCHEMY_DATABASE_URL: "sqlite:////var/lib/marzban/db.sqlite3"
      XRAY_JSON: "/var/lib/marzban/xray_config.json"
      XRAY_EXECUTABLE_PATH: "/usr/local/bin/xray"
      XRAY_ASSETS_PATH: "/usr/local/share/xray"
      SUDO_USERNAME: "${MARZBAN_ADMIN_USER}"
      SUDO_PASSWORD: "${MARZBAN_ADMIN_PASSWORD}"
      XRAY_SUBSCRIPTION_URL_PREFIX: "${SUBSCRIPTION_URL_PREFIX}"
      SUB_PROFILE_TITLE: "${SUB_PROFILE_TITLE:-Ruyin}"
      CUSTOM_TEMPLATES_DIRECTORY: "/var/lib/marzban/templates"
      CLASH_SUBSCRIPTION_TEMPLATE: "clash/default.yml"
    volumes:
      - ${DATA_DIR}/marzban:/var/lib/marzban
    networks:
      - umbra-net

  # -- Subscription metadata normalizer ----------------------------------------
  # Public URL remains /sub/<token>. This service only normalizes response
  # metadata so clients display Ruyin-USERNAME instead of raw Marzban filename.
  umbra-subproxy:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-subproxy:${IMAGE_TAG:-latest}
    container_name: umbra-subproxy
    restart: always
    depends_on:
      - umbra-marzban
    environment:
      MARZBAN_BASE_URL: "https://umbra-marzban:8000"
      SUB_PROFILE_PREFIX: "${SUB_PROFILE_PREFIX:-Ruyin}"
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -- Account Portal: invite-bound user subscription dashboard ----------------
  umbra-account:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-account-api:${IMAGE_TAG:-latest}
    container_name: umbra-account
    restart: always
    depends_on:
      - umbra-marzban
    environment:
      ACCOUNT_DB_PATH: "/var/lib/umbra-account/account.db"
      ACCOUNT_SESSION_SECRET: "${ACCOUNT_SESSION_SECRET}"
      ACCOUNT_INVITE_SECRET: "${ACCOUNT_INVITE_SECRET}"
      ACCOUNT_INVITE_TTL_DAYS: "${ACCOUNT_INVITE_TTL_DAYS:-30}"
      ACCOUNT_ADMIN_USERNAME: "${ACCOUNT_ADMIN_USERNAME}"
      ACCOUNT_ADMIN_PASSWORD: "${ACCOUNT_ADMIN_PASSWORD}"
      ACCOUNT_PORT: "3281"
      MARZBAN_BASE_URL: "https://umbra-marzban:8000"
      MARZBAN_ADMIN_USER: "${MARZBAN_ADMIN_USER}"
      MARZBAN_ADMIN_PASSWORD: "${MARZBAN_ADMIN_PASSWORD}"
      SUB_PROFILE_PREFIX: "${SUB_PROFILE_PREFIX:-Ruyin}"
      JWT_SECRET: "${JWT_SECRET}"
      VXTURE_LOGIN_URL: "${VXTURE_LOGIN_URL}"
      VXTURE_SSO_URL: "${VXTURE_SSO_URL:-}"
      PUBLIC_ACCOUNT_URL: "https://${CONSOLE_DOMAIN}"
    volumes:
      - ${DATA_DIR}/account:/var/lib/umbra-account
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3281/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # -- Account Web: Vxture SSO + invite-bound subscription UI -----------------
  umbra-account-web:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-console:${IMAGE_TAG:-latest}
    container_name: umbra-account-web
    restart: always
    depends_on:
      - umbra-account
    environment:
      PORT: "3220"
      AUTH_BFF_URL: "${AUTH_BFF_URL}"
      AUTH_INTERNAL_TOKEN: "${AUTH_INTERNAL_TOKEN}"
      VXTURE_SSO_URL: "${VXTURE_SSO_URL:-}"
      NEXT_PUBLIC_RUYIN_ACCOUNT_URL: "https://${CONSOLE_DOMAIN}"
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3220/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -- Website: Ruyin public landing and self-built public pages ---------------
  umbra-website:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-website:${IMAGE_TAG:-latest}
    container_name: umbra-website
    restart: always
    environment:
      PORT: "3210"
      NEXT_PUBLIC_HERMES_URL: "https://hermes.vxture.com"
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3210/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -- Admin Web: future dedicated platform management surface -----------------
  # Current nginx routing still sends admin.ruyin.ai/dashboard/ to Marzban and
  # /invites to umbra-account-web. This container is built and published so the
  # route split can be enabled without changing the image pipeline.
  umbra-admin:
    image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/ruyin-admin:${IMAGE_TAG:-latest}
    container_name: umbra-admin
    restart: always
    environment:
      PORT: "3230"
    networks:
      - umbra-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3230/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -- Vaultwarden: Password manager --------------------------------------------
  # Uses SQLite by default - database stored in the /data volume.
  umbra-vaultwarden:
    image: vaultwarden/server:latest
    container_name: umbra-vaultwarden
    restart: always
    environment:
      DOMAIN: "https://${PASS_DOMAIN}"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN}"
      LOG_LEVEL: "warn"
    volumes:
      - ${DATA_DIR}/vaultwarden/data:/data
    networks:
      - umbra-net
