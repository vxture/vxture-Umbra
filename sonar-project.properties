# SonarCloud configuration (read by SonarCloud Automatic Analysis).
#
# Copy-paste detection exclusions. The three portals (website, console, admin)
# are independently built and deployed Next.js apps that deliberately share the
# SAME chrome for cross-portal visual parity: a fixed glass-on-scroll header, a
# content-aligned legal footer, and an identical locale provider. This mirrored
# composition is an explicit design goal (see the "identical to the website +
# console portals" notes in the portal globals.css and shell sources), not an
# accidental clone, so it is excluded from duplication density.
#
# Scoped to the chrome boilerplate only - product/business logic in each portal
# is still fully checked for duplication.
sonar.cpd.exclusions=portals/*/app/locale-provider.tsx,portals/*/lib/locale-provider.tsx,portals/*/app/globals.css,portals/*/app/ui/shell.tsx,portals/website/components/site-header.tsx,portals/website/components/site-footer.tsx
